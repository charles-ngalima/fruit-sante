<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FruitSanté | Guide des Bienfaits</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Fruit<span>Santé</span></div>
            <ul>
                <li><a href="#fruits-grid">Découvrir</a></li>
                <li><a href="#">Conseils</a></li>
            </ul>
        </nav>
    </header>

    <!-- Section Vitrine -->
    <section class="hero">
        <div class="hero-content">
            <h1>La Nature vous veut du bien</h1>
            <p>Découvrez les vertus incroyables des fruits pour votre santé.</p>
            <a href="#fruits-grid" class="btn-main">Explorer les fruits</a>
        </div>
    </section>

    <main class="container">
        <h2 id="fruits-grid">Répertoire des Fruits</h2>

        <!-- Barre de recherche -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Chercher un fruit (ex: Mangue, Citron...)">
        </div>

        <!-- Filtres -->
        <div class="filters">
            <button class="filter-btn active" data-filter="tous">Tous</button>
            <button class="filter-btn" data-filter="immunite">Immunité</button>
            <button class="filter-btn" data-filter="energie">Énergie</button>
            <button class="filter-btn" data-filter="digestion">Digestion</button>
            <button class="filter-btn" data-filter="coeur">Cœur</button>
            <button class="filter-btn" data-filter="peau">Peau</button>
        </div>

        <!-- Grille de fruits -->
        <div class="fruits-grid" id="fruitsContainer">
            <!-- Injecté par le JavaScript -->
        </div>

        <!-- Boutons de navigation -->
        <div class="load-more-container">
            <button id="showLessBtn" class="btn-secondary btn-less">Voir moins</button>
            <button id="loadMoreBtn" class="btn-secondary">Voir plus de fruits</button>
        </div>
    </main>

    <!-- Fenêtre Modale -->
    <div id="fruitModal" class="modal">
        <div class="modal-card">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 FruitSanté - Mangez sain, vivez mieux.</p>
    </footer>

    <!-- Navigation Mobile (Bas d'écran) -->
<div class="mobile-bottom-nav">
    <a href="#fruits-grid" class="nav-item">
        <span>🍎</span>
        <small>Fruits</small>
    </a>
    <a href="#searchInput" class="nav-item">
        <span>🔍</span>
        <small>Chercher</small>
    </a>
    <a href="#" class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'}); return false;">
        <span>⬆️</span>
        <small>Haut</small>
    </a>
</div>

    <script src="script.js"></script>
</body>
</html>
